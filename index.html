<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="WordGuessGame.css">
</head>

<body>
    <div class='p-3 text-center'>
        <div class='shadow-xl m-2 p-3'>
            <h1 class='mt-5 bg-gray-200 p-1 font-bold text-xl text-green-600'>Guess The Word</h1>
            <p id='hint' class='mt-3'> <span class='font-bold'>Hint:</span> Popular Cities of India.</p>
            <p id='blanks' class='mt-3'></p>
            <div class='mt-5'>
                <label>Guess one letter:</label>
                <input id='guess' type='text' class='border-4 border-indigo-300 w-10 h-10 text-center' />
            </div>
            <button class='bg-gray-300 p-1 rounded text-black-500 mt-5 mb-3 text-[13px]' id='submit'>submit</button>
            <div class='text-left mt-2 p-2'>
                <p>Number of Guess: <span class='font-bold' id='numOfGuess'></span></p>
                <p class='text-red-500'>Time: <span id='count' class='font-bold'></span> s</p>
            </div>
        </div>
    </div>
    <script src="WordGuessGame.js"></script>
</body>

</html>
